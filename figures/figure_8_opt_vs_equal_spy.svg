<svg width="1600" height="860" viewBox="0 0 1600 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="860" fill="#FBF7F1"/>
  <rect x="48" y="48" width="1504" height="764" rx="30" fill="#FFFFFF" stroke="#D3C7B8" stroke-width="2"/>
  <text x="90" y="110" fill="#1F3B27" font-family="IBM Plex Sans, sans-serif" font-size="38" font-weight="700">Optimized Portfolio vs. 1/N vs. SPY</text>
  <text x="90" y="150" fill="#59514B" font-family="IBM Plex Sans, sans-serif" font-size="20">Mean realized annual returns across the point-in-time 10-ticker backtests, plus benchmarks</text>

  <line x1="300" y1="240" x2="1300" y2="240" stroke="#E6D6C1" stroke-width="2"/>
  <line x1="300" y1="360" x2="1300" y2="360" stroke="#E6D6C1" stroke-width="2"/>
  <line x1="300" y1="480" x2="1300" y2="480" stroke="#E6D6C1" stroke-width="2"/>
  <line x1="300" y1="600" x2="1300" y2="600" stroke="#E6D6C1" stroke-width="2"/>
  <line x1="300" y1="720" x2="1300" y2="720" stroke="#E6D6C1" stroke-width="2"/>

  <text x="260" y="260" fill="#8A7A6A" font-family="IBM Plex Sans, sans-serif" font-size="18">20%</text>
  <text x="260" y="380" fill="#8A7A6A" font-family="IBM Plex Sans, sans-serif" font-size="18">15%</text>
  <text x="260" y="500" fill="#8A7A6A" font-family="IBM Plex Sans, sans-serif" font-size="18">10%</text>
  <text x="260" y="620" fill="#8A7A6A" font-family="IBM Plex Sans, sans-serif" font-size="18">5%</text>
  <text x="260" y="740" fill="#8A7A6A" font-family="IBM Plex Sans, sans-serif" font-size="18">0%</text>

  <rect x="420" y="430" width="120" height="290" rx="16" fill="#0F5D46"/>
  <text x="480" y="410" fill="#0F5D46" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Optimized</text>
  <text x="480" y="640" fill="#FFFFFF" font-family="IBM Plex Sans, sans-serif" font-size="32" font-weight="700" text-anchor="middle">9.8%</text>

  <rect x="680" y="510" width="120" height="210" rx="16" fill="#6F9C68"/>
  <text x="740" y="410" fill="#0F5D46" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600" text-anchor="middle">1/N</text>
  <text x="740" y="638" fill="#FFFFFF" font-family="IBM Plex Sans, sans-serif" font-size="32" font-weight="700" text-anchor="middle">7.1%</text>

  <rect x="940" y="460" width="120" height="260" rx="16" fill="#224851"/>
  <text x="1000" y="410" fill="#0F5D46" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600" text-anchor="middle">SPY</text>
  <text x="1000" y="638" fill="#FFFFFF" font-family="IBM Plex Sans, sans-serif" font-size="32" font-weight="700" text-anchor="middle">9.2%</text>

  <text x="420" y="740" fill="#5A4C3C" font-family="IBM Plex Sans, sans-serif" font-size="16" text-anchor="middle">Mean realized return</text>

  <text x="510" y="780" fill="#3C3C3C" font-family="IBM Plex Sans, sans-serif" font-size="16" text-anchor="middle">Source: Backtest results (10-ticker 1-year forecast). Optimized portfolio realized ~9.8%, 1/N ~7.1%, SPY ~9.2%.</text>
